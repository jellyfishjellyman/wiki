site_name: GWB Wiki
site_url: https://wiki.gwbblog.top/
site_description: A personal wiki for collections, interests, notes, and images.
repo_url: https://github.com/gwbblog/wiki
repo_name: gwbblog/wiki

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

nav:
  - 首页: index.md
  - 云:
      - clouds/index.md
      - 云的类型: clouds/cloud-types.md
  - 水母:
      - jellyfish/index.md
      - 海月水母: jellyfish/moon-jellyfish.md
  - 卡比:
      - kirby/index.md
      - 游戏作品: kirby/games.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang:
        - zh
        - en
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
      type: date
  - minify:
      minify_html: true
